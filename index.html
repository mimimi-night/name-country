<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Name in other countries?</title>

<style>

#flag{
font-size:50px;
margin-top:20px;
}

.select-label{
font-size:14px;
color:#555;
margin-bottom:5px;
}
  
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:white;
}

.container{
background:white;
color:black;
padding:40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
text-align:center;
width:420px;
}

h1{
margin-bottom:30px;
}

input,select{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
margin:5px;
}

button{
background:#667eea;
color:white;
border:none;
padding:10px 18px;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#5563d1;
}

#result{
margin-top:25px;
font-size:20px;
font-weight:bold;
}

.result-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:20px;
margin-top:20px;
}

.result-card{
background:#f5f6ff;
padding:15px;
border-radius:12px;
font-size:18px;
}
  
</style>

</head>

<body>

<div class="container">

<h1>Your name in other countries</h1>

<input id="nameInput" placeholder="Enter your name">

<p class="select-label">Choose your gender</p>

<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<p class="select-label">Choose your country</p>

  
<select id="country">
<option value="japan">Japan</option>
<option value="usa">USA</option>
<option value="korea">Korea</option>
</select>

<button onclick="convert()">Convert</button>

<div id="result"></div>

<button onclick="shareImage()">Share Image</button>

</div>
  
<script src="names.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="script.js"></script>
</body>
</html>
